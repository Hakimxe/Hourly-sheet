# Tell Nixpacks (Railway's default builder) to install the system libraries
# needed to compile better-sqlite3's native binding from source.
#
# Without python3 / make / gcc, `npm ci` fails with:
#   "gyp ERR! find Python"  or  "make: not found"

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server.js"
